<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Lab: Documentação com Swagger</title>
    <style>
        :root { --cyan: #00f2ff; --green: #39ff14; --bg: #0a0a0c; }
        body { margin: 0; background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        h1 { color: var(--cyan); text-shadow: 0 0 20px var(--cyan); text-transform: uppercase; letter-spacing: 3px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 20px 40px; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; text-decoration: none; color: white; border: 2px solid var(--green); border-radius: 8px; transition: 0.3s; background: transparent; text-align: center; min-width: 280px; }
        .btn:hover { background: var(--green); color: black; box-shadow: 0 0 30px var(--green); }
        .desc { font-size: 0.75rem; color: #888; display: block; margin-top: 8px; font-weight: normal; }
    </style>
</head>
<body>
    <h1>Protocolo de Documentação: Swagger</h1>
    <div class="container">
    <a href="guia_swagger.html" class="btn">
        1. Swagger via JSDoc
        <span class="desc">Documentação integrada ao código (Comentários)</span>
    </a>
    <a href="guia_swagger_json.html" class="btn" style="border-color: var(--pink);">
        2. Swagger via JSON
        <span class="desc" style="color:var(--pink)">Documentação externa (Arquivo Separado)</span>
    </a>
    <a href="https://petstore.swagger.io/" target="_blank" class="btn" style="border-color: var(--cyan);">
        3. Sandbox Live
        <span class="desc" style="color:var(--cyan)">Exemplo Real do Swagger UI</span>
    </a>
</div>
</body>
</html>
